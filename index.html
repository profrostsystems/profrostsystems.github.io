<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

    <link rel="apple-touch-icon" sizes="180x180" href="favicon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon/favicon-16x16.png">
    <link rel="manifest" href="favicon/site.webmanifest">
    <link rel="mask-icon" href="favicon/safari-pinned-tab.svg" color="#5bbad5">
    <meta name="msapplication-TileColor" content="#da532c">
    <meta name="theme-color" content="#ffffff">

    <title>Profrost Systems</title>

    <meta name="description" content="Profrost Systems - stručna montaža i popravka klima uređaja širom Srbije. Kvalitetna usluga, brza intervencija i pouzdani rezultati.">

    <style>
        .hero {
            height: 100vh;
            min-height: 600px;
            background-image: url('media/main_photo.webp');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            position: relative;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.55);
        }

        .hero-content {
            position: relative;
            z-index: 2;
            height: 100%;
        }

        .display-1 {
            font-size: 4rem;
            font-weight: 700;
            line-height: 1.1;
        }

        .btn-call {
            font-size: 1.6rem;
            padding: 18px 55px;
            border-radius: 50px;
            font-weight: 600;
            box-shadow: 0 10px 30px rgba(220, 38, 38, 0.4);
        }

        .btn-call:hover {
            transform: scale(1.08);
            transition: all 0.3s ease;
        }

        /* Još bolje centriranje */
        .hero .container {
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .display-1 { 
                font-size: 2.5rem; 
            }
            .btn-call { 
                font-size: 1.4rem; 
                padding: 16px 45px; 
            }
        }

        @media (max-width: 576px) {
            .display-1 { 
                font-size: 2.1rem; 
            }
        }
    </style>
</head>
<body>

    <!-- HERO SEKCIJA - savršeno centrirano -->
    <section class="hero d-flex align-items-center text-center">
        <div class="container hero-content">
            <div class="row justify-content-center">
                <div class="col-lg-9 col-xl-8">
                    
                    <h1 class="display-1 text-white mb-4">
                        Montaža, Popravka i Servis<br>Klima Uređaja
                    </h1>
                    
                    <p class="lead text-white mb-5 fs-4 fw-light">
                        Profesionalno • Brzo • Pouzdano • širom Srbije
                    </p>
                    
                    <a href="tel:+38163690021" 
                       class="btn btn-danger btn-call d-inline-flex align-items-center gap-3">
                        <i class="bi bi-telephone-fill fs-3"></i>
                        Pozovite Odmah
                    </a>
                    
                    <div class="mt-4 text-white-50 fs-5">
                        <strong>+381 63 690 021</strong>
                    </div>
                </div>
            </div>
        </div>
    </section>

</body>
</html>

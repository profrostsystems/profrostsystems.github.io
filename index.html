<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

    <title>Profrost Systems</title>

    <style>
        .hero {
            height: 100vh;
            min-height: 600px;
            background-image: url('media/main_photo.webp');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            position: relative;
            display: flex;
            align-items: center;        /* Vertikalno centriranje */
            justify-content: center;    /* Horizontalno centriranje */
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.55);
        }

        .main-content {
            position: relative;
            z-index: 2;
            text-align: center;
            width: 100%;
            max-width: 1100px;
            padding: 0 15px;
        }

        /* Prvi red - uvek u jednoj liniji */
        .title-top {
            font-size: 3.8rem;
            font-weight: 700;
            line-height: 1.05;
            white-space: nowrap;
            color: white;
            margin-bottom: 0.2rem;
        }

        /* Drugi red */
        .title-bottom {
            font-size: 4.2rem;
            font-weight: 700;
            line-height: 1.05;
            color: white;
            margin-bottom: 1.5rem;
        }

        .btn-call {
            font-size: 1.6rem;
            padding: 18px 55px;
            border-radius: 50px;
            font-weight: 600;
            box-shadow: 0 10px 30px rgba(220, 38, 38, 0.4);
        }

        .btn-call:hover {
            transform: scale(1.08);
            transition: all 0.3s ease;
        }

        /* Responsive */
        @media (max-width: 1200px) {
            .title-top { font-size: 3.4rem; }
            .title-bottom { font-size: 3.8rem; }
        }

        @media (max-width: 992px) {
            .title-top { font-size: 2.9rem; }
            .title-bottom { font-size: 3.4rem; }
        }

        @media (max-width: 768px) {
            .title-top { font-size: 2.35rem; }
            .title-bottom { font-size: 2.85rem; }
            .btn-call { 
                font-size: 1.35rem; 
                padding: 16px 40px; 
            }
        }

        @media (max-width: 576px) {
            .title-top { font-size: 1.95rem; }
            .title-bottom { font-size: 2.4rem; }
        }
    </style>
</head>
<body>

    <!-- HERO SEKCIJA - centrirano u centar -->
    <section class="hero">
        <div class="main-content">
            
            <h1 class="title-top">
                Montaža • Popravka • Servis
            </h1>
            
            <h1 class="title-bottom">
                Klima Uređaja
            </h1>
            
            <p class="lead text-white mb-5 fs-4 fw-light">
                Profesionalno • Brzo • Pouzdano • širom Srbije
            </p>
            
            <a href="tel:+38163690021" 
               class="btn btn-danger btn-call d-inline-flex align-items-center gap-3">
                <i class="bi bi-telephone-fill fs-3"></i>
                Pozovite Odmah
            </a>
            
            <div class="mt-4 text-white-50 fs-5">
                <strong>+381 63 690 021</strong>
            </div>
        </div>
    </section>

</body>
</html>
